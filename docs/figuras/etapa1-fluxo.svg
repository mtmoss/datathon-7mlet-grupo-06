<svg viewBox="0 0 350 430" xmlns="http://www.w3.org/2000/svg" font-family="Courier New, monospace">
  <rect x="0" y="0" width="350" height="430" fill="#FFFFFF"/>

  <text x="175" y="22" text-anchor="middle" fill="#48494D" font-size="13" font-weight="bold">ETAPA 1 — DO CSV À BASE PRONTA</text>

  <!-- 1 CSV bruto -->
  <rect x="55" y="38" width="240" height="46" rx="4" fill="#48494D"/>
  <text x="175" y="58" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold">CSV bruto (Kaggle)</text>
  <text x="175" y="74" text-anchor="middle" fill="#FFF300" font-size="10">41.188 linhas · não se mexe</text>

  <text x="175" y="100" text-anchor="middle" fill="#48494D" font-size="11">▼  load_raw()</text>

  <!-- 2 limpeza -->
  <rect x="20" y="110" width="310" height="80" rx="4" fill="#EE008B"/>
  <text x="175" y="130" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold">build_modeling_table()</text>
  <text x="175" y="150" text-anchor="middle" fill="#FFFFFF" font-size="10">1. remove "duration" (vazamento)</text>
  <text x="175" y="166" text-anchor="middle" fill="#FFFFFF" font-size="10">2. y (sim/não) → subscribed (1/0)</text>
  <text x="175" y="182" text-anchor="middle" fill="#FFFFFF" font-size="10">3. mantém "unknown" como categoria</text>

  <text x="175" y="208" text-anchor="middle" fill="#48494D" font-size="11">▼  save_processed()</text>

  <!-- 3 base pronta -->
  <rect x="55" y="218" width="240" height="46" rx="4" fill="#00ACF1"/>
  <text x="175" y="238" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold">modeling_table.parquet</text>
  <text x="175" y="254" text-anchor="middle" fill="#FFFFFF" font-size="10">41.188 × 20 · pronta p/ modelar</text>

  <!-- documentacao / provas -->
  <line x1="20" y1="284" x2="330" y2="284" stroke="#48494D" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="175" y="302" text-anchor="middle" fill="#48494D" font-size="11" font-weight="bold">o que comprova o trabalho</text>

  <rect x="20" y="312" width="150" height="44" rx="4" fill="#FFFFFF" stroke="#00ACF1" stroke-width="1.5"/>
  <text x="95" y="330" text-anchor="middle" fill="#48494D" font-size="10" font-weight="bold">DOCS</text>
  <text x="95" y="346" text-anchor="middle" fill="#48494D" font-size="9">kaggle README · dicionário</text>

  <rect x="180" y="312" width="150" height="44" rx="4" fill="#FFFFFF" stroke="#EE008B" stroke-width="1.5"/>
  <text x="255" y="330" text-anchor="middle" fill="#48494D" font-size="10" font-weight="bold">QUALIDADE</text>
  <text x="255" y="346" text-anchor="middle" fill="#48494D" font-size="9">relatório + 6 figuras</text>

  <rect x="20" y="364" width="310" height="44" rx="4" fill="#FFFFFF" stroke="#48494D" stroke-width="1.5"/>
  <text x="175" y="382" text-anchor="middle" fill="#48494D" font-size="10" font-weight="bold">TESTES (pytest) + ruff</text>
  <text x="175" y="398" text-anchor="middle" fill="#48494D" font-size="9">garante que a remoção do vazamento funciona</text>
</svg>
