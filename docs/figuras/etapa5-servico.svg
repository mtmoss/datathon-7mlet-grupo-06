<svg viewBox="0 0 350 460" xmlns="http://www.w3.org/2000/svg" font-family="Courier New, monospace">
  <rect x="0" y="0" width="350" height="460" fill="#FFFFFF"/>
  <text x="175" y="20" text-anchor="middle" fill="#48494D" font-size="13" font-weight="bold">ETAPA 5 — SERVIÇO DE DECISÃO</text>

  <!-- treino offline -->
  <rect x="15" y="34" width="320" height="40" rx="4" fill="#9aa0a6"/>
  <text x="175" y="51" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">TREINO (offline, uma vez)</text>
  <text x="175" y="66" text-anchor="middle" fill="#FFFFFF" font-size="9">política aprendida → models/policy-v1.json</text>

  <text x="175" y="88" text-anchor="middle" fill="#48494D" font-size="10">a API carrega o artefato ▼</text>

  <!-- request -->
  <rect x="15" y="96" width="320" height="44" rx="4" fill="#00ACF1"/>
  <text x="25" y="113" fill="#FFFFFF" font-size="10" font-weight="bold">1. REQUEST  POST /decide</text>
  <text x="25" y="130" fill="#FFFFFF" font-size="9">{ segmento, canal, propensão }</text>

  <text x="175" y="152" text-anchor="middle" fill="#48494D" font-size="11">▼</text>

  <!-- api -->
  <rect x="15" y="158" width="320" height="58" rx="4" fill="#EE008B"/>
  <text x="25" y="175" fill="#FFFFFF" font-size="10" font-weight="bold">2. API valida + decide</text>
  <text x="25" y="191" fill="#FFFFFF" font-size="9">contrato (pydantic) · erro 422/400</text>
  <text x="25" y="206" fill="#FFFFFF" font-size="9">escolhe melhor braço entre os elegíveis</text>

  <text x="175" y="228" text-anchor="middle" fill="#48494D" font-size="11">▼</text>

  <!-- response -->
  <rect x="15" y="234" width="320" height="64" rx="4" fill="#FFF300"/>
  <text x="25" y="251" fill="#48494D" font-size="10" font-weight="bold">3. RESPONSE</text>
  <text x="25" y="267" fill="#48494D" font-size="9">selected_arm · policy_version</text>
  <text x="25" y="281" fill="#48494D" font-size="9">reason_codes (por quê) · score</text>
  <text x="25" y="294" fill="#48494D" font-size="9">decision_id</text>

  <text x="175" y="316" text-anchor="middle" fill="#48494D" font-size="11">▼</text>

  <!-- log -->
  <rect x="15" y="322" width="320" height="40" rx="4" fill="#48494D"/>
  <text x="175" y="339" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold">4. LOG AUDITÁVEL (1 linha/decisão)</text>
  <text x="175" y="354" text-anchor="middle" fill="#FFF300" font-size="9">reports/decision_log.jsonl</text>

  <!-- exemplos -->
  <line x1="15" y1="378" x2="335" y2="378" stroke="#48494D" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="175" y="394" text-anchor="middle" fill="#48494D" font-size="9" font-weight="bold">decisões reais da política treinada</text>
  <text x="25" y="410" fill="#48494D" font-size="9">novo/app        → educacao_financeira</text>
  <text x="25" y="424" fill="#48494D" font-size="9">recorrente/web  → simulador_credito</text>
  <text x="25" y="438" fill="#48494D" font-size="9">reativado/app   → oferta_deposito</text>
  <text x="175" y="453" text-anchor="middle" fill="#48494D" font-size="8">make pipeline · make serve · 27 testes</text>
</svg>
